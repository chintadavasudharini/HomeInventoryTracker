<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Home Inventory Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #f5efe6, #e3d5c9);
            text-align: center;
        }

        /* Navbar */
        nav {
            background-color: #5a4a38;
            padding: 10px 0;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        h1 {
            color: #5a4a38;
            margin-top: 20px;
            font-size: 45px;
        }

        .wlc {
            color: #5a4a38;
            font-size: 22px;
        }

        /* Form */
        #add-item-form {
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            border-radius: 5px;
        }

        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input {
            flex: 1 1 150px;
        }

        button {
            background: #ab76399a;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #a0794ddf;
        }

        /* Table Section */
        #inventory-list {
            background: #ffffff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            width: 90%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #b89c7d;
            color: white;
        }

        .edit-btn, .save-btn {
            background-color: #7ab96b;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .edit-btn:hover, .save-btn:hover {
            background-color: #4e893f;
        }

        .delete-btn {
            background-color: #d9534f;
            color: white;
            padding: 8px;
            border-radius: 5px;
            text-decoration: none;
        }

        .delete-btn:hover {
            background-color: #c9302c;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="{{ url_for('add_item', username=username) }}">Add Item</a>
        <a href="{{ url_for('dashboard', username=username) }}">View Items</a>
        <a href="{{ url_for('dashboard', username=username) }}">Dashboard</a>
        <a href="#">Location</a>
        <a href="#">Profile</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>

    <h1>Home Inventory Tracker</h1>
    <p class="wlc">Welcome, {{ username }}!</p>

    <!-- Item Condition Form -->
    <div id="add-item-form">
        <h2>Item Condition</h2>
        <form action="{{ url_for('add_item', username=username) }}" method="POST">
            <input type="text" name="item_name" placeholder="Item Name" required>
            <input type="text" name="condition" placeholder="Condition" required>
            <input type="text" name="location" placeholder="Location" required>
            <input type="text" name="service_number" placeholder="Service Number" required>
            <button type="submit">Update Item</button>
        </form>
    </div>

    <!-- Inventory Table -->
    <div id="inventory-list">
        <h2>Inventory Items</h2>
        <form action="{{ url_for('dashboard', username=username) }}" method="GET">
            <input type="text" name="search" placeholder="Search items..." value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Purchase Date</th>
                    <th>Condition</th>
                    <th>Location</th>
                    <th>Service No.</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                {% for item in inventory %}
                <tr>
                    <form action="{{ url_for('edit_item', username=username, item_index=loop.index0) }}" method="POST">
                        <td><input type="text" name="item_name" value="{{ item.name }}" disabled></td>
                        <td><input type="date" name="purchase_date" value="{{ item.purchase_date }}" disabled></td>
                        <td><input type="text" name="condition" value="{{ item.condition }}" disabled></td>
                        <td><input type="text" name="location" value="{{ item.location }}" disabled></td>
                        <td><input type="text" name="service_number" value="{{ item.service_number }}" disabled></td>
                        <td>
                            <button type="button" class="edit-btn" onclick="enableEditing(this)">Edit</button>
                            <button type="submit" class="save-btn hidden">Save</button>
                        </td>
                        <td>
                            <a href="#" onclick="confirmDelete('{{ username }}', '{{ loop.index0 }}')" class="delete-btn">Delete</a>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        function enableEditing(button) {
            const row = button.closest('tr');
            row.querySelectorAll('input').forEach(input => input.disabled = false);
            button.classList.add('hidden');
            row.querySelector('.save-btn').classList.remove('hidden');
        }

        function confirmDelete(username, itemIndex) {
            let confirmAction = confirm("Are you sure you want to delete this item?");
            if (confirmAction) {
                window.location.href = /delete_item/${username}/${itemIndex};
            }
        }
    </script>
</body>
</html>
